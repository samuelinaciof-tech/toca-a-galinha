    </table></div>`;
  }

  return html;
}
// ── MODO DASHBOARD (TV/Monitor) ────────────────────────────────────────
let dashClockTimer=null;

function enterDashboard(){
  document.querySelector('.shell').classList.add('dash-mode');
  // Wrap o conteúdo principal
  const content=document.querySelector('.content');
  if(content&&!document.querySelector('.dash-mode-wrap')){
    const wrap=document.createElement('div');
    wrap.className='dash-mode-wrap';
    content.parentNode.insertBefore(wrap,content);
    wrap.appendChild(content);
  }
  updateDashTopbar();
  // Relógio
  dashClockTimer=setInterval(()=>{
    const cl=document.getElementById('dashClock');
    if(cl)cl.textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    updateDashTopbar();
  },1000);
  // Fullscreen no body — mantém position:fixed visível
  try{
    const el=document.body;
    if(el.requestFullscreen)el.requestFullscreen();
    else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
  }catch(e){}
}

function exitDashboard(){
  document.querySelector('.shell')?.classList.remove('dash-mode');
  // Unwrap
  const wrap=document.querySelector('.dash-mode-wrap');
  const cnt=document.querySelector('.content');
  if(wrap&&cnt){wrap.parentNode.insertBefore(cnt,wrap);wrap.remove();}
  if(dashClockTimer){clearInterval(dashClockTimer);dashClockTimer=null;}
  try{
    if(document.fullscreenElement)document.exitFullscreen();
    else if(document.webkitFullscreenElement)document.webkitExitFullscreen();
  }catch(e){}
}

function updateDashTopbar(){
  // Atualiza resumo e dots na topbar do dashboard
  const boards=CACHE.implBoards;
  if(!boards.length)return;
  const bi=Math.min(S.implBoard,boards.length-1);
  const board=boards[bi];
  // Título
  const t=document.getElementById('dashBoardTitle');
  if(t)t.textContent=board.name;
  // Summary
  let totOk=0,totAt=0,totPa=0,totDn=0;
  CACHE.implCards.filter(c=>c.board_id===board.id).forEach(c=>{
    const s=implCardStatus(c);
    if(s==='ok')totOk++;else if(s==='at')totAt++;else if(s==='pa')totPa++;else if(s==='dn')totDn++;
  });
  const sum=document.getElementById('dashSummary');
  if(sum)sum.innerHTML=`
    <span class="impl-sum-pill ok">✓ ${totOk} Em dia</span>
    <span class="impl-sum-pill at">✗ ${totAt} Atrasado${totAt!==1?'s':''}</span>
    <span class="impl-sum-pill pa">⏸ ${totPa} Pausa${totPa!==1?'s':''}</span>
    <span class="impl-sum-pill dn">● ${totDn} Concluído${totDn!==1?'s':''}</span>`;
  // Dots
  const dots=document.getElementById('dashDots');
  if(dots)dots.innerHTML=boards.map((b,i)=>`<button class="impl-dot${i===bi?' on':''}" onclick="implGoTo(${i})" title="${esc(b.name)}"></button>`).join('');
}

  if(!isAdmin()){
    const userCompany = S.user?.company;
    const comp = CACHE.companies.find(c=>c.name===userCompany||c.id===userCompany);
    if(comp) cls = cls.filter(c=>c.company_id===comp.id);
    else cls = [];
  }
  return cls;
}

function rClientes(){
  const allCli = getVisibleClients();
  const total = allCli.length;
  const ativos = allCli.filter(c=>c.status==='ativo'||c.status==='implantacao').length;
  const churn = allCli.filter(c=>c.status==='churn').length;
  const emImpl = allCli.filter(c=>c.status==='implantacao').length;
  const pausados = allCli.filter(c=>c.status==='pausado').length;

  // Taxa de churn
  const concluidos = allCli.filter(c=>c.status==='ativo'||c.status==='churn').length;
  const taxaChurn = concluidos>0?Math.round((churn/concluidos)*100):0;

  // Tempo médio de implantação (clientes com início e fim)
  const duracoes = allCli.filter(c=>c.start_date&&c.end_date&&c.status==='ativo').map(c=>{
    const d1=new Date(c.start_date),d2=new Date(c.end_date);
    return Math.max(0,Math.round((d2-d1)/(1000*60*60*24)));
  }).filter(d=>d>0);
  const tmedio = duracoes.length?Math.round(duracoes.reduce((a,b)=>a+b,0)/duracoes.length):null;

  // Implantações em risco (>150 dias sem fim)
  const hoje = new Date();
  const emRisco = allCli.filter(c=>c.status==='implantacao'&&c.start_date).filter(c=>{
    const dias = Math.round((hoje-new Date(c.start_date))/(1000*60*60*24));
    return dias>150;
  }).length;

  // Filtro + busca
  let filtered = allCli;
  if(S.cliFilter&&S.cliFilter!=='todos') filtered=filtered.filter(c=>c.status===S.cliFilter);
  if(S.cliSearch) filtered=filtered.filter(c=>(c.name||'').toLowerCase().includes(S.cliSearch.toLowerCase())||(c.razao_social||'').toLowerCase().includes(S.cliSearch.toLowerCase()));
  filtered.sort((a,b)=>a.name.localeCompare(b.name,'pt-BR'));

  const filters=[
    {key:'todos',label:`Todos (${total})`},
    {key:'ativo',label:`Ativos (${allCli.filter(c=>c.status==='ativo').length})`},
    {key:'implantacao',label:`Em Impl. (${emImpl})`},
    {key:'churn',label:`Churn (${churn})`},
    {key:'pausado',label:`Pausados (${pausados})`},
  ];

  let html=``;

  // Stats bar
  html+=`<div class="cli-stat-bar">
    <div class="sc or"><div class="sc-l">Total clientes</div><div class="sc-v">${total}</div></div>
    <div class="sc gn"><div class="sc-l">Ativos</div><div class="sc-v">${ativos}</div><div class="sc-s">${allCli.filter(c=>c.status==='ativo').length} impl. + ${emImpl} em andamento</div></div>
    <div class="sc rd"><div class="sc-l">Taxa de churn</div><div class="sc-v">${taxaChurn}%</div><div class="sc-s">${churn} clientes perdidos</div></div>
    ${tmedio?`<div class="sc bl"><div class="sc-l">Tempo médio impl.</div><div class="sc-v">${tmedio}d</div><div class="sc-s">clientes ativos</div></div>`:`<div class="sc gy"><div class="sc-l">Tempo médio impl.</div><div class="sc-v">—</div></div>`}
    ${emRisco?`<div class="sc rd"><div class="sc-l">Em risco (&gt;150d)</div><div class="sc-v">${emRisco}</div><div class="sc-s">sem conclusão</div></div>`:''}
  </div>`;

  // Toolbar
  html+=`<div class="cli-search-row">
    <input class="fi" style="max-width:240px;padding:6px 10px;font-size:12px" placeholder="Buscar cliente..." value="${esc(S.cliSearch||'')}" oninput="S.cliSearch=this.value;render()">
    <div class="cli-filter-pills">${filters.map(f=>`<button class="cli-pill ${S.cliFilter===f.key?'on':''}" onclick="S.cliFilter='${f.key}';render()">${f.label}</button>`).join('')}</div>
    ${isAdmin()?`<button class="btn btn-or" style="margin-left:auto" onclick="openModal('newCliente','')">+ Novo cliente</button>`:''}
  </div>`;

  if(!filtered.length){
    html+=`<div class="empty"><div class="ei">🏢</div><div class="et">Nenhum cliente encontrado</div></div>`;
    return html;
  }

  // Cards grid
  html+=`<div class="cli-grid">`;
  filtered.forEach(c=>{
    const comp = CACHE.companies.find(x=>x.id===c.company_id);
    const hoje2 = new Date();
    let diasStr='';
    if(c.status==='implantacao'&&c.start_date){
      const dias=Math.round((hoje2-new Date(c.start_date))/(1000*60*60*24));
      diasStr=`<div class="cli-row"><span class="cli-lbl">Em andamento</span><span class="cli-val" style="color:${dias>150?'var(--red)':'var(--tx2)'}">${dias} dias</span></div>`;
    }
    let duracaoStr='';
    if(c.start_date&&c.end_date){
      const dias=Math.round((new Date(c.end_date)-new Date(c.start_date))/(1000*60*60*24));
      duracaoStr=`<div class="cli-row"><span class="cli-lbl">Duração impl.</span><span class="cli-val">${dias} dias</span></div>`;
    }
    html+=`<div class="cli-card st-${c.status||'ativo'}" onclick="viewCliente('${c.id}')">
      <div class="cli-name">${esc(c.name)}</div>
      ${c.razao_social?`<div class="cli-razao">${esc(c.razao_social)}</div>`:'<div class="cli-razao" style="opacity:0">—</div>'}
      <div class="cli-row">
        <span>${statusCliLabel(c.status)}</span>
        ${comp?`<span class="bx bx-gy" style="font-size:9px">${esc(comp.name)}</span>`:''}
      </div>
      <div class="cli-row"><span class="cli-lbl">Início</span><span class="cli-val">${fd(c.start_date)}</span></div>
      ${c.end_date?`<div class="cli-row"><span class="cli-lbl">Fim implantação</span><span class="cli-val">${fd(c.end_date)}</span></div>`:''}
      ${diasStr}${duracaoStr}
      ${c.observacoes?`<div class="cli-obs">${esc(c.observacoes.slice(0,80))}${c.observacoes.length>80?'…':''}</div>`:''}
    </div>`;
  });
  html+=`</div>`;
  return html;
}

function rClienteDetalhe(id){
  const c = CACHE.clients.find(x=>x.id===id);
  if(!c) return`<div class="empty"><div class="et">Cliente não encontrado</div></div>`;
  const comp = CACHE.companies.find(x=>x.id===c.company_id);
  const hoje = new Date();
  let diasAndamento=null,duracaoImpl=null;
  if(c.status==='implantacao'&&c.start_date) diasAndamento=Math.round((hoje-new Date(c.start_date))/(1000*60*60*24));
  if(c.start_date&&c.end_date) duracaoImpl=Math.round((new Date(c.end_date)-new Date(c.start_date))/(1000*60*60*24));

  return`<div>
    <button class="btn btn-gh btn-sm" onclick="nav('clientes')" style="margin-bottom:14px">← Voltar</button>
    <div class="cli-detail-header">
      <div>
        <div class="cli-detail-name">${esc(c.name)}</div>
        ${c.razao_social?`<div class="cli-detail-razao">${esc(c.razao_social)}</div>`:''}
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        ${statusCliLabel(c.status)}
        ${isAdmin()?`<button class="btn btn-gh btn-sm" onclick="openModal('editCliente','${c.id}')">✏️ Editar</button>`:''}
        ${isAdmin()?`<button class="btn btn-rd btn-sm" onclick="deleteCliente('${c.id}')">✕</button>`:''}
      </div>
    </div>

    <div class="cli-metrics">
      <div class="sc or"><div class="sc-l">Empresa</div><div class="sc-v" style="font-size:14px">${esc(comp?.name||'—')}</div></div>
      <div class="sc bl"><div class="sc-l">Início</div><div class="sc-v" style="font-size:14px">${fd(c.start_date)}</div></div>
      <div class="sc ${c.end_date?'gn':'gy'}"><div class="sc-l">Fim implantação</div><div class="sc-v" style="font-size:14px">${fd(c.end_date)}</div></div>
      ${duracaoImpl!==null?`<div class="sc bl"><div class="sc-l">Duração</div><div class="sc-v">${duracaoImpl}d</div></div>`:''}
      ${diasAndamento!==null?`<div class="sc ${diasAndamento>150?'rd':'or'}"><div class="sc-l">Em andamento</div><div class="sc-v">${diasAndamento}d</div><div class="sc-s">${diasAndamento>150?'⚠️ Em risco':''}</div></div>`:''}
    </div>

    ${c.observacoes?`<div class="card"><div class="card-h"><div class="card-t">Observações</div></div><div style="padding:12px 14px;font-size:12px;color:var(--tx2);line-height:1.7">${esc(c.observacoes)}</div></div>`:''}
  </div>`;
}

window.viewCliente=id=>{S.page='clienteDetalhe';S.clienteId=id;render();};

// ── MODAIS CLIENTES ────────────────────────────────────────────────────

  <div class="modal"><div class="mh"><div class="mt">Novo Cliente</div><button class="mx" onclick="closeModal()">✕</button></div>
  <div class="mb">
    <div class="fg"><label class="fl">Nome fantasia *</label><input class="fi" id="cliName" placeholder="Ex: Lunelli"></div>
    <div class="fg"><label class="fl">Razão social</label><input class="fi" id="cliRazao" placeholder="Ex: Lunelli Têxtil Ltda"></div>
    <div class="fr fr2">
      <div class="fg"><label class="fl">Empresa *</label><select class="fs" id="cliCompany">
        <option value="">Selecione...</option>

    </div>

function rModalEditCliente(id){
  const c = CACHE.clients.find(x=>x.id===id);
  if(!c) return'';
  const companies = CACHE.companies;
  return`<div class="mbg" onclick="if(event.target===this)closeModal()">
  <div class="modal"><div class="mh"><div class="mt">Editar Cliente</div><button class="mx" onclick="closeModal()">✕</button></div>
  <div class="mb">
    <div class="fg"><label class="fl">Nome fantasia *</label><input class="fi" id="cliName" value="${esc(c.name)}" placeholder="Ex: Lunelli"></div>
    <div class="fg"><label class="fl">Razão social</label><input class="fi" id="cliRazao" value="${esc(c.razao_social||'')}" placeholder="Ex: Lunelli Têxtil Ltda"></div>
    <div class="fr fr2">
      <div class="fg"><label class="fl">Empresa *</label><select class="fs" id="cliCompany">
        <option value="">Selecione...</option>
        ${companies.map(x=>`<option value="${x.id}" ${x.id===c.company_id?'selected':''}>${esc(x.name)}</option>`).join('')}
      </select></div>
      <div class="fg"><label class="fl">Status *</label><select class="fs" id="cliStatus">
        ${['ativo','implantacao','churn','pausado'].map(s=>`<option value="${s}" ${c.status===s?'selected':''}>${s==='ativo'?'Ativo':s==='implantacao'?'Em Implantação':s==='churn'?'Churn':'Pausado'}</option>`).join('')}
      </select></div>
    </div>
    <div class="fr fr2">
      <div class="fg"><label class="fl">Data início</label><input class="fi" type="date" id="cliStart" value="${c.start_date||''}"></div>
      <div class="fg"><label class="fl">Fim implantação</label><input class="fi" type="date" id="cliEnd" value="${c.end_date||''}"></div>
    </div>
    <div class="fg"><label class="fl">Observações</label><textarea class="ft" id="cliObs" placeholder="Anotações livres...">${esc(c.observacoes||'')}</textarea></div>
  </div>
  <div class="mf"><button class="btn btn-gh" onclick="closeModal()">Cancelar</button><button class="btn btn-or" onclick="saveEditCliente('${id}')">Salvar</button></div>
  </div></div>`;
}

window.saveNewCliente=async function(){
  const name=gv('cliName'),razao=gv('cliRazao'),company_id=gv('cliCompany'),status=gv('cliStatus'),start_date=gv('cliStart')||null,end_date=gv('cliEnd')||null,observacoes=gv('cliObs');
  if(!name){alert('Informe o nome fantasia.');return;}
  if(!company_id){alert('Selecione a empresa.');return;}
  const row={id:uid(),name,razao_social:razao||null,company_id,status,start_date,end_date,observacoes:observacoes||null};
  const r=await sb('clients','POST',row);
  if(r){CACHE.clients=[...CACHE.clients,...(Array.isArray(r)?r:[r])];S.modal=null;render();}
};

window.saveEditCliente=async function(id){
  const name=gv('cliName'),razao=gv('cliRazao'),company_id=gv('cliCompany'),status=gv('cliStatus'),start_date=gv('cliStart')||null,end_date=gv('cliEnd')||null,observacoes=gv('cliObs');
  if(!name){alert('Informe o nome fantasia.');return;}
  if(!company_id){alert('Selecione a empresa.');return;}
  const upd={name,razao_social:razao||null,company_id,status,start_date,end_date,observacoes:observacoes||null};
  const r=await sb('clients','PATCH',upd,`?id=eq.${id}`);
  if(r!==null){CACHE.clients=CACHE.clients.map(c=>c.id===id?{...c,...upd}:c);S.modal=null;if(S.page==='clienteDetalhe')render();else render();}
};

window.deleteCliente=async function(id){
  const c=CACHE.clients.find(x=>x.id===id);
  if(!confirm(`Excluir "${c?.name}"? Esta ação não pode ser desfeita.`))return;
  const r=await sb('clients','DELETE',null,`?id=eq.${id}`);
  if(r){CACHE.clients=CACHE.clients.filter(x=>x.id!==id);nav('clientes');}
};


// ── INIT ───────────────────────────────────────────────────────────────
(async()=>{
  const restored=await tryRestoreSession();
  if(!restored)render();
})();
</script>
